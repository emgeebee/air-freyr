services:
  airfreyr:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    ports:
      - "3797:3797"
    environment:
      AIRFREYR_HOSTNAME: "0.0.0.0"
      AIRFREYR_PORT: "3797"
      AIRFREYR_QUEUE_DIR: /data/queues
      AIRFREYR_OUTPUT_DIR: /data/music
      AIRFREYR_CONFIG: /data/config/conf.json
      AIRFREYR_REFRESH_HOURS: "3"
    volumes:
      # queue .json files (e.g. kids.json)
      - ./queues:/data/queues
      # downloaded tracks
      - ./music:/data/music
      # conf.json and persisted AirFreyr credentials
      - ./config:/data/config
    restart: unless-stopped
